version: '0.1.0-{build}'

image:
  - Visual Studio 2022
  - Ubuntu

for:
  -
    matrix:
      only:
        - image: Visual Studio 2022

    environment:
      WIN_SIGN_CERTIFICATE: ''
      WIN_SIGN_URL: ''
    install:
      - ps: |
          appveyor-retry choco install rustup.install --no-progress
          rustup default stable-msvc
          npx @tauri-apps/cli --version
      - cmd: npm ci
    build_script:
      - cmd: npm run tauri build
    artifacts:
      - path: src-tauri\target\release\bundle\msi\*.msi
        name: installer
      - path: src-tauri\target\release\bundle\nsis\*.exe
        name: installer

  -
    matrix:
      only:
        - image: Ubuntu

    install:
      - sh: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libssl-dev libsoup-3.0-dev \
            javascriptcoregtk-4.1 libjavascriptcoregtk-4.1-dev
          npx @tauri-apps/cli --version
      - sh: npm ci
    build_script:
      - sh: npm run tauri build
    artifacts:
      - path: src-tauri/target/release/bundle/deb/*.deb
        name: deb
      - path: src-tauri/target/release/bundle/rpm/*.rpm
        name: rpm
      - path: src-tauri/target/release/bundle/appimage/*.AppImage
        name: appimage

notifications:
  - provider: Email
    on_build_success: false
    on_build_failure: false
